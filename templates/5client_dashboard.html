<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MiloFitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/admin_dashboard.css') }}">
</head>
<body>

  <div class="admin-shell">

    <aside class="admin-sidebar">
      <img src="{{ url_for('static', filename='images/UI/logo.png') }}" alt="Alex">
      <div class="admin-subtitle">Member Portal</div>

      <nav class="admin-nav">
        <a href="{{ url_for('dashboard') }}" class="admin-nav__link admin-nav__link--active">Dashboard</a>
        <a href="{{ url_for('my_timetable') }}" class="admin-nav__link">Timetable</a>
      </nav>

      <div class="admin-sidebar-footer">
        <div class="admin-user-chip">Logged in as <strong>{{ username }}</strong></div>
        <a href="{{ url_for('logout') }}" class="admin-logout">Log out</a>
      </div>
    </aside>

    <main class="admin-main">

      <div class="admin-header">
        <div>
          <div class="admin-header__eyebrow">Member Area</div>
          <h1 class="admin-header__title">Welcome, {{ username }}</h1>
        </div>
      </div>

      <div class="client-card-grid">
        <a href="{{ url_for('my_timetable') }}" class="client-card">
          <div class="client-card__title">My Timetable</div>
          <p class="client-card__desc">View the sessions Alex has booked you into this week.</p>
        </a>

        <div class="client-card client-card--disabled">
          <div class="client-card__title">My Program</div>
          <p class="client-card__desc">Coming soon.</p>
        </div>

        <div class="client-card client-card--disabled">
          <div class="client-card__title">My Progress</div>
          <p class="client-card__desc">Coming soon.</p>
        </div>
      </div>

    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
