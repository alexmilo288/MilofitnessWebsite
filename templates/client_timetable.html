<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Timetable — MiloFitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/admin_dashboard.css') }}">
</head>
<body>

  <div class="admin-shell">

    <aside class="admin-sidebar">
      <div class="admin-logo">MILO<span>FITNESS</span></div>
      <div class="admin-subtitle">Member Portal</div>

      <nav class="admin-nav">
        <a href="{{ url_for('dashboard') }}" class="admin-nav__link">Dashboard</a>
        <a href="{{ url_for('my_timetable') }}" class="admin-nav__link admin-nav__link--active">Timetable</a>
      </nav>

      <div class="admin-sidebar-footer">
        <div class="admin-user-chip">Logged in as <strong>{{ username }}</strong></div>
        <a href="{{ url_for('logout') }}" class="admin-logout">Log out</a>
      </div>
    </aside>

    <main class="admin-main">

      <div class="admin-header">
        <div>
          <div class="admin-header__eyebrow">Member Area</div>
          <h1 class="admin-header__title">My Timetable</h1>
        </div>
      </div>

      <div class="week-nav">
        <button type="button" id="prevWeekBtn" class="btn btn--ghost btn--small">&larr; Prev Week</button>
        <div class="week-nav__label" id="weekLabel">Loading...</div>
        <button type="button" id="nextWeekBtn" class="btn btn--ghost btn--small">Next Week &rarr;</button>
      </div>

      <div class="calendar-wrap">
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div id="noSlotsMsg" style="display:none; margin-top:24px; color:var(--grey);"></div>

    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/client_timetable.js') }}"></script>
</body>
</html>
